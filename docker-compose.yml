services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    image: nanbao/ocr:latest
    container_name: nanbao-ocr-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    environment:
      APP_NAME: NanBao OCR Studio
      ENVIRONMENT: development
      PORT: 8000
      WEB_ORIGIN: http://localhost:8000
      ALLOWED_HOSTS: localhost,127.0.0.1
      ENABLE_DOCS: "true"
      DATABASE_URL: sqlite+pysqlite:////data/ocr.db
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/projects
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      API_TOKEN: ${API_TOKEN:-}
      API_TOKENS: ${API_TOKENS:-}
      DEFAULT_SOURCE_LANG: ${DEFAULT_SOURCE_LANG:-zh}
      DEFAULT_TARGET_LANG: ${DEFAULT_TARGET_LANG:-vi}
    ports:
      - "8000:8000"
    volumes:
      - app_data:/data

  redis:
    image: redis:7
    container_name: nanbao-ocr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  app_data:

